services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-evictor}"
      POSTGRES_USER: "${POSTGRES_USER:-evictor}"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes: [postgres_data:/var/lib/postgresql/data]
    secrets: [postgres_password]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    restart: on-failure:10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  backend:
    image: "${BACKEND_IMAGE:?BACKEND_IMAGE is required}:${IMAGE_TAG:?IMAGE_TAG is required}"
    environment:
      EVICTOR_ROLE: api
      PORT: 8080
      DATABASE_URL_FILE: /run/secrets/database_url
      EVICTOR_ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    secrets:
      - database_url
      - encryption_key
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    restart: on-failure:10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  worker:
    image: "${BACKEND_IMAGE:?BACKEND_IMAGE is required}:${IMAGE_TAG:?IMAGE_TAG is required}"
    command: ["worker"]
    environment:
      EVICTOR_ROLE: worker
      DATABASE_URL_FILE: /run/secrets/database_url
      EVICTOR_ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
    secrets:
      - database_url
      - encryption_key
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    restart: on-failure:10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  frontend:
    image: "${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}:${IMAGE_TAG:?IMAGE_TAG is required}"
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080}"
      TARGET_DOMAIN: "${TARGET_DOMAIN:?TARGET_DOMAIN is required}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    restart: on-failure:10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  postgres_data:
    name: "${COMPOSE_PROJECT_NAME:-evictor}_postgres_data"

secrets:
  postgres_password:
    file: "${SECRETS_DIR:?SECRETS_DIR is required}/postgres_password"
  database_url:
    file: "${SECRETS_DIR:?SECRETS_DIR is required}/database_url"
  encryption_key:
    file: "${SECRETS_DIR:?SECRETS_DIR is required}/encryption_key"

networks:
  default:
    name: "${COMPOSE_NETWORK:?COMPOSE_NETWORK is required}"
