services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-evictor}"
      POSTGRES_USER: "${POSTGRES_USER:-evictor}"
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets: [postgres_password]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    restart: on-failure:10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  backend:
    build:
      context: ./backend
    environment:
      EVICTOR_ROLE: api
      PORT: 8080
      DATABASE_URL_FILE: /run/secrets/database_url
      EVICTOR_ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    secrets:
      - database_url
      - encryption_key
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    restart: on-failure:10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  mock-provider:
    build:
      context: ./backend
      dockerfile: Dockerfile.mockprovider
    environment:
      PORT: 8091
    ports:
      - "${MOCK_PROVIDER_PORT:-8091}:8091"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8091/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    restart: on-failure:10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  worker:
    build:
      context: ./backend
    command: ["worker"]
    environment:
      EVICTOR_ROLE: worker
      DATABASE_URL_FILE: /run/secrets/database_url
      EVICTOR_ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
    secrets:
      - database_url
      - encryption_key
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    restart: on-failure:10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      target: dev
    command: ["npm", "run", "dev"]
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
    restart: on-failure:10
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  postgres_data:

secrets:
  postgres_password:
    file: "${SECRETS_DIR:-./secrets/dev}/postgres_password"
  database_url:
    file: "${SECRETS_DIR:-./secrets/dev}/database_url"
  encryption_key:
    file: "${SECRETS_DIR:-./secrets/dev}/encryption_key"

networks:
  default:
    name: "${COMPOSE_NETWORK:-evictor-dev}"
