name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  branch-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion path
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if [ "$BASE_BRANCH" = "master" ] && [ "$HEAD_BRANCH" = "dev" ]; then
            exit 0
          fi

          if [ "$BASE_BRANCH" = "dev" ] && [ "$HEAD_BRANCH" != "master" ]; then
            exit 0
          fi

          echo "Invalid pull request route: $HEAD_BRANCH -> $BASE_BRANCH"
          echo "Feature branches must target dev; only dev may target master."
          exit 1

  commit-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Validate Conventional Commits
        env:
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          zero_sha=0000000000000000000000000000000000000000
          if [ -n "$BASE_REF" ]; then
            npx commitlint --from "origin/$BASE_REF" --to HEAD --verbose
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "$zero_sha" ] && git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            npx commitlint --from "$BEFORE_SHA" --to HEAD --verbose
          elif [ "$REF_NAME" != "dev" ] && [ "$REF_NAME" != "master" ]; then
            git fetch origin dev:refs/remotes/origin/dev
            npx commitlint --from origin/dev --to HEAD --verbose
          else
            git log -1 --pretty=%B | npx commitlint --verbose
          fi

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: evictor
          POSTGRES_USER: evictor
          POSTGRES_PASSWORD: evictor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U evictor -d evictor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://evictor:evictor@localhost:5432/evictor?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          working-directory: backend
      - name: Run migrations
        run: go run -tags 'pgx5' github.com/golang-migrate/migrate/v4/cmd/migrate -path internal/migrations -database "pgx5://evictor:evictor@localhost:5432/evictor?sslmode=disable" up
      - run: go test ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
