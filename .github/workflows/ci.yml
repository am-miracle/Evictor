name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  branch-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion path
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if [ "$BASE_BRANCH" = "master" ] && [ "$HEAD_BRANCH" = "dev" ]; then
            exit 0
          fi

          if [ "$BASE_BRANCH" = "dev" ] && [ "$HEAD_BRANCH" != "master" ]; then
            exit 0
          fi

          echo "Invalid pull request route: $HEAD_BRANCH -> $BASE_BRANCH"
          echo "Feature branches must target dev; only dev may target master."
          exit 1

  commit-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Validate Conventional Commits
        env:
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          zero_sha=0000000000000000000000000000000000000000
          if [ -n "$BASE_REF" ]; then
            npx commitlint --from "origin/$BASE_REF" --to HEAD --verbose
          elif [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "$zero_sha" ]; then
            npx commitlint --from "$BEFORE_SHA" --to HEAD --verbose
          else
            git log -1 --pretty=%B | npx commitlint --verbose
          fi

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: false
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          working-directory: backend
      - run: go test ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
