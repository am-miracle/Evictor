# Changelog configuration for Conventional Commits.
# Install git-cliff locally (`brew install git-cliff` or `cargo install git-cliff`).

[changelog]
header = "# Changelog\n\nAll notable changes to Evictor are documented here.\n"
body = """
{% if version %}## {{ version }}{% else %}## Unreleased{% endif %}

{% for group, commits in commits | group_by(attribute=\"group\") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end=\"\") }})
{% endfor %}
{% endfor %}
"""
trim = true
render_always = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = true
commit_preprocessors = []
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^build|^ci|^chore", group = "Maintenance" },
  { message = "^revert", group = "Reverts" },
]
filter_commits = true
sort_commits = "oldest"
